<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skolenkäten – Resultat & trender 2015–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#004b62; --brand-d:#00384a; --teal:#137870; --green:#50a27e; --gold:#fbba30;
  --panel:#ffffff; --ink:#212529; --muted:#6c757d;
  --line:#dee2e6; --line2:#e9ecef; --accent:#004b62;
  --tint:#e6f5f2; --tint2:#e5eff4;
  --pos:#137870; --pos2:#50a27e; --mid:#f59c00; --neg:#da4c15; --vetej:#adb5bd;
  --shadow:0 1px 2px rgba(0,75,98,.06),0 6px 18px rgba(0,75,98,.07);
  --radius:6px;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Mulish',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:#f3f6f7;-webkit-font-smoothing:antialiased}
a{color:var(--brand)}
header.top{background:#fff;border-bottom:4px solid var(--brand);padding:0}
header.top .bar{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:22px;
  padding:18px 24px 16px}
header.top .logo{height:48px;width:auto;flex:none}
header.top .titles{border-left:2px solid var(--line);padding-left:22px}
@media(max-width:560px){header.top .logo{height:38px}}
header.top h1{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--brand)}
header.top p{margin:3px 0 0;color:var(--muted);font-size:13px;max-width:780px}
.tabs{background:var(--brand)}
.tabs .inner{max-width:1180px;margin:0 auto;display:flex;gap:0;padding:0 24px;flex-wrap:wrap}
.tab{appearance:none;border:0;background:transparent;color:#cfe4ea;font-weight:700;
  font-size:14px;padding:13px 20px;cursor:pointer;border-bottom:3px solid transparent}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--gold)}
main{max-width:1180px;margin:0 auto;padding:24px 24px 64px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px 22px;margin-bottom:20px}
.panel h2{margin:0 0 4px;font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--brand)}
.panel .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:18px}
.ctrl{display:flex;flex-direction:column;gap:5px}
.ctrl label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
select,.btnlike{font-size:14px;font-family:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius);
  background:#fff;color:var(--ink);min-width:150px;cursor:pointer}
select:focus{outline:2px solid var(--brand);border-color:var(--brand)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:13px;font-weight:600;padding:7px 13px;border-radius:var(--radius);border:1px solid var(--line);
  background:#fff;color:var(--ink);cursor:pointer;user-select:none;transition:.12s}
.chip:hover{border-color:var(--brand)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.chip.theme.on{background:var(--teal);border-color:var(--teal)}
.chip.sm{font-size:12px;padding:4px 9px}
.periodfilter{display:flex;flex-wrap:wrap;gap:10px;align-items:stretch}
.pf-year{display:flex;flex-direction:column;gap:5px;border:1px solid var(--line);
  border-radius:var(--radius);padding:7px 8px;background:#fff;min-width:58px}
.pf-year .yr{font-size:13px;font-weight:800;padding:4px 6px;border-radius:4px;cursor:pointer;
  text-align:center;color:var(--brand);user-select:none;border:1px solid transparent}
.pf-year .yr.on{background:var(--brand);color:#fff}
.pf-year .yr.partial{background:var(--tint2);border-color:var(--brand)}
.pf-terms{display:flex;gap:4px;justify-content:center}
.pf-terms .tm{font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--muted);user-select:none}
.pf-terms .tm.on{background:var(--teal);border-color:var(--teal);color:#fff}
.pf-actions{display:flex;gap:7px;align-items:center;margin:2px 0 14px}
.linklike{background:none;border:0;color:var(--brand);font-weight:700;font-size:12.5px;
  cursor:pointer;font-family:inherit;padding:4px 6px}
.linklike:hover{text-decoration:underline}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:4px}
.kpi{background:var(--tint);border:1px solid var(--line);border-left:4px solid var(--brand);
  border-radius:var(--radius);padding:16px 18px}
.kpi .n{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--brand)}
.kpi .l{font-size:12.5px;color:var(--muted);margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
@media(max-width:860px){.grid2,.grid3{grid-template-columns:1fr}
  header.top .titles p{display:none}}
.chartbox{position:relative;height:380px}
.chartbox.sm{height:300px}
.legendnote{font-size:12px;color:var(--muted);margin-top:10px;display:flex;gap:16px;flex-wrap:wrap}
.legendnote span{display:inline-flex;align-items:center;gap:6px}
.dot{width:11px;height:11px;border-radius:2px;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px}
.badge.calc{background:#fdeccd;color:#8a5a00}
.badge.rev{background:var(--tint2);color:var(--brand)}
.qrow{cursor:pointer}
.qrow:hover{background:var(--tint)}
.qrow.sel{background:var(--tint2)}
.gauge{display:flex;align-items:center;gap:14px}
.gauge .val{font-size:40px;font-weight:800;letter-spacing:-.03em}
.gauge .scale{font-size:12px;color:var(--muted)}
.note{font-size:12.5px;color:var(--muted);background:var(--tint);border:1px solid var(--line);
  border-left:4px solid var(--teal);border-radius:var(--radius);padding:12px 14px;margin-top:8px}
.hidden{display:none}
.pillbar{display:flex;height:26px;border-radius:4px;overflow:hidden;border:1px solid var(--line);margin:4px 0}
.pillbar i{display:block;height:100%}
.flex{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.muted{color:var(--muted)}
/* karta */
.maplayout{display:grid;grid-template-columns:minmax(280px,1fr) 320px;gap:20px}
@media(max-width:820px){.maplayout{grid-template-columns:1fr}}
.mapbox{position:relative;background:var(--tint2);border:1px solid var(--line);
  border-radius:var(--radius);padding:8px;min-height:480px}
.mapbox svg{display:block;width:100%;height:auto;max-height:74vh}
.mapbox svg path{stroke:#fff;stroke-width:.4;cursor:pointer;transition:fill .15s}
.mapbox svg path:hover{stroke:#0f172a;stroke-width:1.1}
.mapbox svg path.sel{stroke:#0f172a;stroke-width:1.4}
.maptip{position:absolute;pointer-events:none;background:#0f172a;color:#fff;font-size:12px;
  padding:6px 9px;border-radius:6px;transform:translate(-50%,-115%);white-space:nowrap;
  box-shadow:0 4px 12px rgba(0,0,0,.25);opacity:0;transition:opacity .1s;z-index:5}
.legendbar{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
.legendbar .grad{height:14px;flex:1;border-radius:3px;border:1px solid var(--line)}
.ranklist{font-size:13px}
.ranklist .row{display:flex;justify-content:space-between;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer}
.ranklist .row:hover{background:var(--tint)}
.ranklist .row.sel{background:var(--tint2)}
.ranklist .v{font-weight:700;font-variant-numeric:tabular-nums}
.kpick{display:flex;flex-direction:column;gap:6px}
.bigval{font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1}
</style>
</head>
<body>
<header class="top">
  <div class="bar">
    <img class="logo" src="vendor/skolinspektionen_logo.svg" alt="Skolinspektionen">
    <div class="titles">
      <h1>Skolenkäten · resultat &amp; trender 2015–2026</h1>
      <p>Utforska hur elever, vårdnadshavare och lärare svarar – jämför mellan år och
         områden, och gräv ner dig i enskilda frågor. Skala 0–10, högre är bättre.</p>
    </div>
  </div>
</header>
<nav class="tabs"><div class="inner" id="tabs"></div></nav>
<main id="main"></main>

<script src="vendor/chart.umd.js"></script>
<script src="skolenkaten_data.js"></script>
<script src="kolada_data.js"></script>
<script>
const D = window.SKOLDATA;
const M = D.meta;
const periods = M.periods;                       // ordnade
const periodLabels = periods.map(p=>p.label);
const fmt = n => (n==null?'–':n.toFixed(1).replace('.',','));

// valda mättillfällen (kan klickas i/ur). Default: alla.
const selPeriods = new Set(periodLabels);
const activeLabels = () => periodLabels.filter(l=>selPeriods.has(l));
const periodsByYear = () => {
  const o={}; periods.forEach(p=>{(o[p.year]=o[p.year]||[]).push(p);}); return o;
};

// färgpaletter – Skolinspektionens profil
const SERIES_COLORS = ['#004b62','#137870','#da4c15','#f59c00','#50a27e','#004f7a','#9d4e8c','#7a8b1f'];
const ANSWER5 = ['#137870','#7bbfa0','#f59c00','#da4c15','#c4cdd3'];
const ANSWER6 = ['#004b62','#137870','#7bbfa0','#f59c00','#da4c15','#c4cdd3'];
const REV_YEARS = {2018:'Reviderad enkät 2018', 2022:'Stor revidering 2022'};

let charts = [];
function clearCharts(){charts.forEach(c=>c.destroy());charts=[];}

// ---- helpers ----
function seriesFor(group, subgroup, omrade){
  return D.index_series.find(s=>s.group===group&&s.subgroup===subgroup&&s.omrade===omrade);
}
function omradenFor(group, subgroup){
  const set=new Set();
  D.index_series.forEach(s=>{if(s.group===group&&s.subgroup===subgroup)set.add(s.omrade);});
  return [...set].sort();
}
function subgroupsWithData(group){
  const set=new Set();
  D.index_series.forEach(s=>{if(s.group===group)set.add(s.subgroup);});
  // behåll ordning enligt meta om möjligt
  const order=M.subgroups[group]||[];
  return [...set].sort((a,b)=>(order.indexOf(a)-order.indexOf(b)));
}
function questionsFor(period,group,subgroup,omrade){
  return D.questions.filter(q=>q.period===period&&q.group===group&&
    (subgroup==null||q.subgroup===subgroup)&&(omrade==null||q.omrade===omrade));
}
function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  kids.flat().forEach(k=>e.append(k?.nodeType?k:document.createTextNode(k??'')));
  return e;
}
function option(v,t,sel){const o=el('option',{value:v},t);if(sel)o.selected=true;return o;}

// markerar revisionsbrott i linjediagram (utgår från diagrammets etiketter)
const REV_LABELS = new Set(['VT 2018','2022']);
const revisionPlugin = {
  id:'revlines',
  afterDraw(chart){
    const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
    (chart.data.labels||[]).forEach((lab,i)=>{
      if(!REV_LABELS.has(lab))return;
      const xp=x.getPixelForValue(i);
      ctx.save();ctx.strokeStyle='rgba(0,75,98,.35)';ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(xp,top);ctx.lineTo(xp,bottom);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle='#9a7b16';ctx.font='10px Mulish,sans-serif';
      ctx.fillText('revidering',xp+3,top+11);ctx.restore();
    });
  }
};

function lineChart(canvas, datasets, {min,max,yTitle,labels}={}){
  const c=new Chart(canvas,{
    type:'line',
    data:{labels:labels||periodLabels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8,font:{size:12}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.y)}`}}
      },
      scales:{
        y:{min:min??null,max:max??null,title:{display:!!yTitle,text:yTitle},
           grid:{color:'#eef2f7'},ticks:{font:{size:11}}},
        x:{grid:{display:false},ticks:{font:{size:11},maxRotation:60,minRotation:0}}
      }
    },
    plugins:[revisionPlugin]
  });
  charts.push(c);return c;
}
// bygg dataset från en indexserie längs valda etiketter (luckor = null)
function datasetFromSeries(s, color, label, labels){
  labels = labels||periodLabels;
  const byLabel={};s.points.forEach(p=>byLabel[p.label]=p);
  const data=labels.map(l=>byLabel[l]?byLabel[l].index:null);
  const calc=labels.map(l=>byLabel[l]&&byLabel[l].source==='beräknad');
  return {
    label, data, borderColor:color, backgroundColor:color+'22',
    spanGaps:true, tension:.3, borderWidth:2.5, pointRadius:4, pointHoverRadius:6,
    pointStyle:labels.map((l,i)=>calc[i]?'rectRot':'circle'),
    pointBackgroundColor:labels.map((l,i)=>calc[i]?'#fff':color),
    pointBorderColor:color
  };
}

// periodväljare: klicka år / delar av år i och ur -> graferna uppdateras
function renderPeriodFilter(panel){
  const wrap=el('div');
  wrap.append(el('div',{class:'flex',style:'margin-bottom:8px'},
    el('span',{class:'muted',style:'font-size:12px;font-weight:700'},'Tidsperioder:'),
    el('button',{class:'linklike',onclick:()=>{periodLabels.forEach(l=>selPeriods.add(l));renderMain();}},'Markera alla'),
    el('button',{class:'linklike',onclick:()=>{const keep=periodLabels.slice(-6);selPeriods.clear();keep.forEach(l=>selPeriods.add(l));renderMain();}},'Senaste 6'),
    el('button',{class:'linklike',onclick:()=>{selPeriods.clear();periods.forEach(p=>{if(p.term==='helar'||p.term==='vt')selPeriods.add(p.label);});renderMain();}},'Vårtermin/helår')));
  const pf=el('div',{class:'periodfilter'});
  const byYear=periodsByYear();
  Object.keys(byYear).sort().forEach(yr=>{
    const ps=byYear[yr];
    const allOn=ps.every(p=>selPeriods.has(p.label));
    const anyOn=ps.some(p=>selPeriods.has(p.label));
    const yrEl=el('div',{class:'pf-year'});
    yrEl.append(el('div',{class:'yr'+(allOn?' on':anyOn?' partial':''),
      onclick:()=>{ if(allOn)ps.forEach(p=>selPeriods.delete(p.label));
                    else ps.forEach(p=>selPeriods.add(p.label)); renderMain(); }},yr));
    if(ps.length>1){
      const tr=el('div',{class:'pf-terms'});
      ps.forEach(p=>{
        const t=p.term==='vt'?'VT':p.term==='ht'?'HT':'År';
        tr.append(el('div',{class:'tm'+(selPeriods.has(p.label)?' on':''),
          onclick:()=>{ selPeriods.has(p.label)?selPeriods.delete(p.label):selPeriods.add(p.label); renderMain(); }},t));
      });
      yrEl.append(tr);
    }
    pf.append(yrEl);
  });
  wrap.append(pf);
  panel.append(wrap);
}

/* ===================== ÖVERSIKT ===================== */
function renderOversikt(root){
  const kpis=el('div',{class:'kpis'});
  const facts=[
    [periods.length,'mättillfällen (VT/HT 2015 → 2026)'],
    [D.questions.length.toLocaleString('sv'),'extraherade frågesvar'],
    [M.groups.length,'svarsgrupper'],
    [D.index_series.length,'indextidsserier']
  ];
  facts.forEach(f=>kpis.append(el('div',{class:'kpi'},
    el('div',{class:'n'},String(f[0])),el('div',{class:'l'},f[1]))));
  root.append(el('div',{class:'panel'},
    el('h2',{},'Översikt'),
    el('p',{class:'sub'},'Hela materialet i siffror. Välj en flik ovan för att utforska vidare.'),
    kpis));

  // highlight: stabila teman för Elever (alla delgrupper sammanslaget = medel)
  const themes=M.stable_themes;
  const box=el('div',{class:'panel'},
    el('h2',{},'Stabila teman över tid · elever'),
    el('p',{class:'sub'},'Genomsnittligt index för elever (alla årskurser). Streckade markörer = beräknat värde där officiellt index saknas. Lodräta linjer markerar enkätrevisioner.'),
    el('div',{class:'chartbox'},el('canvas',{id:'ovChart'})));
  root.append(box);
  const datasets=themes.map((t,i)=>{
    // medel över delgrupper per period
    const subs=subgroupsWithData('Elever');
    const acc={};
    subs.forEach(sg=>{const s=seriesFor('Elever',sg,t);if(s)s.points.forEach(p=>{
      (acc[p.label]=acc[p.label]||[]).push(p.index);});});
    const pts=Object.keys(acc).map(l=>({label:l,index:acc[l].reduce((a,b)=>a+b,0)/acc[l].length,source:'agg'}));
    return datasetFromSeries({points:pts}, SERIES_COLORS[i], t);
  });
  lineChart(document.getElementById('ovChart'),datasets,{min:4,max:10,yTitle:'Index (0–10)'});

  root.append(el('div',{class:'note'},
    'Datakälla: Skolinspektionens öppet publicerade totalrapporter för Skolenkäten. '+
    'Frågor och frågeområden har reviderats över tid (tydligast 2018 och 2022), '+
    'vilket gör jämförelser över dessa brott ungefärliga. Stabila teman som trygghet och '+
    'studiero går dock att följa hela vägen.'));
}

/* ===================== TRENDER ===================== */
const tState={group:'Elever',omrade:'Trygghet',subs:null,showCalc:true};
function renderTrender(root){
  const groups=M.groups;
  if(!tState.subs)tState.subs=new Set(subgroupsWithData(tState.group));
  const panel=el('div',{class:'panel'});
  panel.append(el('h2',{},'Trender över tid'),
    el('p',{class:'sub'},'Följ ett frågeområde över åren. Välj grupp, område och vilka delgrupper som ska visas.'));

  const ctrls=el('div',{class:'controls'});
  // grupp
  const gSel=el('select',{onchange:e=>{tState.group=e.target.value;
    tState.subs=new Set(subgroupsWithData(tState.group));
    const oms=omradenFor(tState.group,[...tState.subs][0]);
    if(!omradenForAny(tState.group).includes(tState.omrade))tState.omrade=omradenForAny(tState.group)[0];
    renderMain();}},...groups.map(g=>option(g,g,g===tState.group)));
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Grupp'),gSel));
  // område
  const allOm=omradenForAny(tState.group);
  const oSel=el('select',{onchange:e=>{tState.omrade=e.target.value;renderMain();}},
    ...allOm.map(o=>option(o,o,o===tState.omrade)));
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Frågeområde'),oSel));
  panel.append(ctrls);

  // snabbval stabila teman
  const themeRow=el('div',{class:'chips',style:'margin-bottom:14px'});
  M.stable_themes.forEach(t=>{
    if(!allOm.includes(t))return;
    themeRow.append(el('span',{class:'chip theme'+(t===tState.omrade?' on':''),
      onclick:()=>{tState.omrade=t;renderMain();}},t));
  });
  if(themeRow.children.length)panel.append(el('div',{class:'flex'},
    el('span',{class:'muted',style:'font-size:12px;font-weight:700'},'Stabila teman:'),themeRow));

  // delgrupper (checkbar via chips)
  const subRow=el('div',{class:'chips',style:'margin:14px 0'});
  subgroupsWithData(tState.group).forEach(sg=>{
    subRow.append(el('span',{class:'chip'+(tState.subs.has(sg)?' on':''),
      onclick:()=>{tState.subs.has(sg)?tState.subs.delete(sg):tState.subs.add(sg);
        if(tState.subs.size===0)tState.subs.add(sg);renderMain();}},sg));
  });
  panel.append(el('div',{class:'flex'},
    el('span',{class:'muted',style:'font-size:12px;font-weight:700'},'Delgrupper:'),subRow));

  // periodväljare (klicka år / delar av år i och ur)
  renderPeriodFilter(panel);
  panel.append(el('div',{class:'pf-actions'}));

  panel.append(el('div',{class:'chartbox'},el('canvas',{id:'trChart'})));
  panel.append(el('div',{class:'legendnote'},
    el('span',{},el('span',{class:'dot',style:'background:#004b62'}),'heldragen markör = officiellt index'),
    el('span',{},'◇ ihålig = beräknat (medel av frågor där index saknas)'),
    el('span',{},'streckad lodrät = enkätrevision')));
  root.append(panel);

  const labels=activeLabels();
  const subs=[...tState.subs];
  const datasets=subs.map((sg,i)=>{
    const s=seriesFor(tState.group,sg,tState.omrade);
    if(!s)return null;
    return datasetFromSeries(s,SERIES_COLORS[i%SERIES_COLORS.length],sg,labels);
  }).filter(Boolean);
  if(datasets.length===0||labels.length===0){
    panel.append(el('div',{class:'note'},
      labels.length===0?'Inga tidsperioder valda – markera minst en ovan.':'Inga data för den kombinationen.'));
  }
  setTimeout(()=>{ // canvas måste finnas i DOM
    const cv=document.getElementById('trChart');
    if(cv&&datasets.length&&labels.length)lineChart(cv,datasets,{min:3,max:10,yTitle:'Index (0–10)',labels});
  },0);
}
function omradenForAny(group){
  const set=new Set();
  D.index_series.forEach(s=>{if(s.group===group)set.add(s.omrade);});
  return [...set].sort();
}

/* ===================== JÄMFÖR ÅR ===================== */
const cState={group:'Elever',sub:null,pA:null,pB:null};
function renderJamfor(root){
  if(!cState.sub)cState.sub=subgroupsWithData(cState.group)[0];
  const subs=subgroupsWithData(cState.group);
  if(!subs.includes(cState.sub))cState.sub=subs[0];
  // perioder som har data för denna grupp/delgrupp
  const avail=periods.filter(p=>D.index_series.some(s=>
    s.group===cState.group&&s.subgroup===cState.sub&&s.points.some(x=>x.label===p.label)));
  if(!cState.pA||!avail.some(p=>p.label===cState.pA))cState.pA=avail[0]?.label;
  if(!cState.pB||!avail.some(p=>p.label===cState.pB))cState.pB=avail[avail.length-1]?.label;

  const panel=el('div',{class:'panel'});
  panel.append(el('h2',{},'Jämför två mättillfällen'),
    el('p',{class:'sub'},'Ställ alla frågeområdens index sida vid sida för två valda tidpunkter.'));
  const ctrls=el('div',{class:'controls'});
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Grupp'),
    el('select',{onchange:e=>{cState.group=e.target.value;cState.sub=null;renderMain();}},
      ...M.groups.map(g=>option(g,g,g===cState.group)))));
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Delgrupp'),
    el('select',{onchange:e=>{cState.sub=e.target.value;renderMain();}},
      ...subs.map(s=>option(s,s,s===cState.sub)))));
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Tidpunkt A'),
    el('select',{onchange:e=>{cState.pA=e.target.value;renderMain();}},
      ...avail.map(p=>option(p.label,p.label,p.label===cState.pA)))));
  ctrls.append(el('div',{class:'ctrl'},el('label',{},'Tidpunkt B'),
    el('select',{onchange:e=>{cState.pB=e.target.value;renderMain();}},
      ...avail.map(p=>option(p.label,p.label,p.label===cState.pB)))));
  panel.append(ctrls);
  panel.append(el('div',{class:'chartbox'},el('canvas',{id:'cmpChart'})));
  root.append(panel);

  // data
  const oms=omradenFor(cState.group,cState.sub);
  const valA=[],valB=[],labels=[];
  oms.forEach(o=>{
    const s=seriesFor(cState.group,cState.sub,o);
    const a=s.points.find(p=>p.label===cState.pA);
    const b=s.points.find(p=>p.label===cState.pB);
    if(a||b){labels.push(o);valA.push(a?a.index:null);valB.push(b?b.index:null);}
  });
  setTimeout(()=>{
    const cv=document.getElementById('cmpChart');if(!cv)return;
    const c=new Chart(cv,{type:'bar',
      data:{labels,datasets:[
        {label:cState.pA,data:valA,backgroundColor:'#9fc6d1',borderColor:'#004b62',borderWidth:1},
        {label:cState.pB,data:valB,backgroundColor:'#004b62'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        scales:{x:{min:0,max:10,grid:{color:'#eef2f7'}},y:{grid:{display:false},ticks:{font:{size:11}}}},
        plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8}},
          tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.x)}`}}}}});
    charts.push(c);
  },0);

  // tabell med differens
  const tbl=el('table');
  tbl.append(el('thead',{},el('tr',{},
    el('th',{},'Frågeområde'),el('th',{class:'num'},cState.pA),
    el('th',{class:'num'},cState.pB),el('th',{class:'num'},'Δ'))));
  const tb=el('tbody');
  labels.forEach((o,i)=>{
    const d=(valA[i]!=null&&valB[i]!=null)?(valB[i]-valA[i]):null;
    const col=d==null?'':(d>0?'var(--pos)':d<0?'var(--neg)':'var(--muted)');
    tb.append(el('tr',{},el('td',{},o),el('td',{class:'num'},fmt(valA[i])),
      el('td',{class:'num'},fmt(valB[i])),
      el('td',{class:'num',style:`color:${col};font-weight:700`},
        d==null?'–':(d>0?'+':'')+fmt(d))));
  });
  tbl.append(tb);
  root.append(el('div',{class:'panel'},el('h2',{},'Detaljerad jämförelse'),tbl));
}

/* ===================== UTFORSKA (drill-down) ===================== */
const eState={period:null,group:'Elever',sub:null,omrade:null,qi:0};
function renderUtforska(root){
  eState.period=eState.period||periods[periods.length-1].key;
  // grupper/delgrupper som har frågor detta år
  const grp=eState.group;
  let subs=[...new Set(questionsFor(eState.period,grp).map(q=>q.subgroup))];
  if(subs.length===0){ // grupp saknar data detta år -> ta en grupp som har
    const g2=M.groups.find(g=>questionsFor(eState.period,g).length);
    if(g2){eState.group=g2;subs=[...new Set(questionsFor(eState.period,g2).map(q=>q.subgroup))];}
  }
  if(!subs.includes(eState.sub))eState.sub=subs[0];
  let oms=[...new Set(questionsFor(eState.period,eState.group,eState.sub).map(q=>q.omrade).filter(Boolean))];
  if(!oms.includes(eState.omrade))eState.omrade=oms[0];
  let qs=questionsFor(eState.period,eState.group,eState.sub,eState.omrade);
  if(eState.qi>=qs.length)eState.qi=0;

  const panel=el('div',{class:'panel'});
  panel.append(el('h2',{},'Utforska svaren'),
    el('p',{class:'sub'},'Borra ner till en enskild fråga och se hela svarsfördelningen.'));
  const ctrls=el('div',{class:'controls'});
  ctrls.append(mkSel('År',periods.map(p=>[p.key,p.label]),eState.period,v=>{eState.period=v;eState.sub=null;eState.omrade=null;renderMain();}));
  ctrls.append(mkSel('Grupp',M.groups.map(g=>[g,g]),eState.group,v=>{eState.group=v;eState.sub=null;eState.omrade=null;renderMain();}));
  ctrls.append(mkSel('Delgrupp',subs.map(s=>[s,s]),eState.sub,v=>{eState.sub=v;eState.omrade=null;renderMain();}));
  ctrls.append(mkSel('Frågeområde',oms.map(o=>[o,o]),eState.omrade,v=>{eState.omrade=v;eState.qi=0;renderMain();}));
  panel.append(ctrls);
  root.append(panel);

  if(qs.length===0){root.append(el('div',{class:'panel'},'Inga frågor för valet.'));return;}
  const q=qs[eState.qi];
  const scale=q.n_alt===6?(M.scale6):(M.scale5);
  const colors=q.n_alt===6?ANSWER6:ANSWER5;

  // vänster: doughnut + gauge ; höger: frågelista
  const left=el('div',{class:'panel'});
  left.append(el('h2',{html:q.fraga}),
    el('p',{class:'sub'},`${eState.group} · ${eState.sub} · ${eState.omrade} · ${q.label}`));
  const g=el('div',{class:'gauge'},
    el('div',{},el('div',{class:'val',style:colForMedel(q.medel)},fmt(q.medel)),
      el('div',{class:'scale'},'medelvärde (0–10)')),
    pill(q.andelar,colors));
  left.append(g);
  left.append(el('div',{class:'chartbox sm'},el('canvas',{id:'dnChart'})));
  // legend för svarsalternativ
  const leg=el('div',{class:'legendnote'});
  scale.forEach((s,i)=> i<q.andelar.length && leg.append(el('span',{},
    el('span',{class:'dot',style:`background:${colors[i]}`}),`${s} – ${fmt(q.andelar[i])}%`)));
  left.append(leg);
  if(q.reverse)left.append(el('div',{class:'note'},
    'Detta är ett negativt formulerat påstående (markerat “–” i rapporten). '+
    'Medelvärdet är omvänt beräknat så att ett högt värde alltid är önskvärt.'));

  // höger: alla frågor i området, klickbara
  const right=el('div',{class:'panel'});
  right.append(el('h2',{},'Frågor i området'),
    el('p',{class:'sub'},'Klicka för att byta fråga.'));
  const tbl=el('table');
  tbl.append(el('thead',{},el('tr',{},el('th',{},'Fråga'),el('th',{class:'num'},'Medel'))));
  const tb=el('tbody');
  qs.forEach((qq,i)=>{
    tb.append(el('tr',{class:'qrow'+(i===eState.qi?' sel':''),onclick:()=>{eState.qi=i;renderMain();}},
      el('td',{},qq.fraga+(qq.reverse?' ↺':'')),
      el('td',{class:'num',style:colForMedel(qq.medel)+';font-weight:700'},fmt(qq.medel))));
  });
  tbl.append(tb);right.append(tbl);

  root.append(el('div',{class:'grid2'},left,right));

  setTimeout(()=>{
    const cv=document.getElementById('dnChart');if(!cv)return;
    const c=new Chart(cv,{type:'doughnut',
      data:{labels:scale.slice(0,q.andelar.length),
        datasets:[{data:q.andelar,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.parsed)}%`}}}}});
    charts.push(c);
  },0);
}
function mkSel(label,opts,val,cb){
  return el('div',{class:'ctrl'},el('label',{},label),
    el('select',{onchange:e=>cb(e.target.value)},...opts.map(o=>option(o[0],o[1],o[0]===val))));
}
function pill(andelar,colors){
  const w=el('div',{class:'pillbar',style:'flex:1;min-width:200px'});
  andelar.forEach((a,i)=>w.append(el('i',{style:`width:${a}%;background:${colors[i]}`,title:fmt(a)+'%'})));
  return w;
}
function colForMedel(m){
  const c=m>=7.5?'var(--pos)':m>=6?'#2b8a82':m>=5?'var(--mid)':'var(--neg)';
  return `color:${c}`;
}

/* ===================== KARTA ===================== */
const K = window.KOLADA;
const kState={kpi:K.kpis[0].id, year:K.years[K.years.length-1], sel:null};
let geoProjCache=null;

function hexLerp(a,b,t){
  const pa=[1,3,5].map(i=>parseInt(a.substr(i,2),16));
  const pb=[1,3,5].map(i=>parseInt(b.substr(i,2),16));
  const p=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));
  return '#'+p.map(v=>v.toString(16).padStart(2,'0')).join('');
}
// divergerande skala kring medianen: röd (under) -> ljus -> teal (över)
function colorFor(v, med){
  if(v==null) return '#e3e8ea';
  const d=Math.max(-12,Math.min(12,v-med))/12;       // -1..1
  return d<0 ? hexLerp('#f3f6f7','#c1361b',-d) : hexLerp('#f3f6f7','#0e6b63',d);
}
function median(arr){
  if(!arr.length) return null;
  const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}
function buildProjection(feats){
  if(geoProjCache) return geoProjCache;
  let xmin=1e9,xmax=-1e9,ymin=1e9,ymax=-1e9;
  const midLat=62*Math.PI/180, kx=Math.cos(midLat);
  const pts=f=>{const g=f.geometry;return g.type==='MultiPolygon'?g.coordinates.flat(1):g.coordinates;};
  feats.forEach(f=>pts(f).forEach(ring=>ring.forEach(([lon,lat])=>{
    const x=lon*kx, y=-lat;
    if(x<xmin)xmin=x;if(x>xmax)xmax=x;if(y<ymin)ymin=y;if(y>ymax)ymax=y;
  })));
  const W=460, pad=8;
  const scale=(W-2*pad)/(xmax-xmin);
  const H=(ymax-ymin)*scale+2*pad;
  geoProjCache={kx,xmin,ymin,scale,pad,W,H:Math.round(H)};
  return geoProjCache;
}
function pathD(feat, P){
  const ring2d=ring=>ring.map(([lon,lat],i)=>{
    const x=(lon*P.kx-P.xmin)*P.scale+P.pad, y=(-lat-P.ymin)*P.scale+P.pad;
    return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }).join('')+'Z';
  const g=feat.geometry;
  const polys=g.type==='MultiPolygon'?g.coordinates:[g.coordinates];
  return polys.map(poly=>poly.map(ring2d).join('')).join('');
}

function renderKarta(root){
  if(!window.SWEDEN_GEO){
    root.append(el('div',{class:'panel'},el('h2',{},'Karta'),
      el('p',{class:'sub'},'Laddar kartdata …')));
    const s=document.createElement('script');
    s.src='vendor/sweden_kommuner.js';
    s.onload=()=>{ if(active==='karta') renderMain(); };
    s.onerror=()=>{ const p=root.querySelector('.sub'); if(p)p.textContent='Kunde inte ladda kartdata (vendor/sweden_kommuner.js).'; };
    document.body.append(s);
    return;
  }
  const feats=window.SWEDEN_GEO.features;
  const P=buildProjection(feats);
  const kpi=K.kpis.find(k=>k.id===kState.kpi);
  const vals=K.data[kState.kpi][String(kState.year)]||{};
  const arr=Object.values(vals);
  const med=median(arr);

  // ---- panel + kontroller ----
  const panel=el('div',{class:'panel'});
  panel.append(el('h2',{},'Sverigekarta · '+kpi.tema.toLowerCase()),
    el('p',{class:'sub'},'Andel som svarat ”Helt och hållet” per kommun. Färgen visar hur kommunen ligger till mot kommunmedianen. Källa: Kolada.'));
  const ctrls=el('div',{class:'controls'});
  const kpiOpts=K.kpis.map(k=>[k.id, `${k.tema} – ${k.grupp}`]);
  ctrls.append(mkSel('Fråga / grupp',kpiOpts,kState.kpi,v=>{kState.kpi=v;kState.sel=null;renderMain();}));
  ctrls.append(mkSel('År',K.years.map(y=>[y,String(y)]),kState.year,v=>{kState.year=+v;renderMain();}));
  panel.append(ctrls);
  panel.append(el('p',{class:'sub',style:'margin:0'},
    el('b',{html:kpi.fraga}),'  ·  ',
    `${arr.length} kommuner med data  ·  median ${fmt(med)} %`));

  // ---- SVG-karta ----
  const mapbox=el('div',{class:'mapbox'});
  const tip=el('div',{class:'maptip'});
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${P.W} ${P.H}`);
  feats.forEach(f=>{
    const code=f.properties.id, v=vals[code];
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',pathD(f,P));
    path.setAttribute('fill',colorFor(v,med));
    if(code===kState.sel)path.setAttribute('class','sel');
    path.addEventListener('mousemove',e=>{
      const r=mapbox.getBoundingClientRect();
      tip.style.left=(e.clientX-r.left)+'px';tip.style.top=(e.clientY-r.top)+'px';
      tip.style.opacity='1';
      tip.innerHTML=`<b>${f.properties.namn}</b> · ${v==null?'ingen data':fmt(v)+' %'}`;
    });
    path.addEventListener('mouseleave',()=>tip.style.opacity='0');
    path.addEventListener('click',()=>{kState.sel=(kState.sel===code?null:code);renderMain();});
    svg.append(path);
  });
  mapbox.append(svg,tip);

  // ---- sidopanel: vald kommun + topp/botten ----
  const side=el('div');
  const selV = kState.sel?vals[kState.sel]:null;
  const selName = kState.sel?(feats.find(f=>f.properties.id===kState.sel)?.properties.namn):null;
  if(kState.sel){
    const diff=selV!=null?selV-med:null;
    side.append(el('div',{class:'panel',style:'margin-bottom:16px'},
      el('div',{class:'sub',style:'margin:0 0 4px'},'Vald kommun'),
      el('div',{style:'font-weight:800;font-size:16px;color:var(--brand)'},selName),
      el('div',{class:'bigval',style:'margin:6px 0'},selV==null?'–':fmt(selV)+' %'),
      el('div',{class:'muted',style:'font-size:13px'},
        diff==null?'Ingen data':(diff>=0?'+':'')+fmt(diff)+' jmf. median ('+fmt(med)+' %)')));
  }
  // rangordning
  const ranked=Object.entries(vals).map(([c,v])=>({c,v,
    namn:feats.find(f=>f.properties.id===c)?.properties.namn||c})).sort((a,b)=>b.v-a.v);
  const mkRows=list=>{const w=el('div',{class:'ranklist'});
    list.forEach(r=>w.append(el('div',{class:'row'+(r.c===kState.sel?' sel':''),
      onclick:()=>{kState.sel=(kState.sel===r.c?null:r.c);renderMain();}},
      el('span',{},r.namn),el('span',{class:'v',style:colForPct(r.v,med)},fmt(r.v)+' %'))));
    return w;};
  side.append(el('div',{class:'panel'},
    el('h2',{style:'font-size:15px'},'Högst'),mkRows(ranked.slice(0,6)),
    el('h2',{style:'font-size:15px;margin-top:14px'},'Lägst'),mkRows(ranked.slice(-6).reverse())));

  panel.append(el('div',{class:'maplayout'},mapbox,side));
  // legend
  const grad=el('div',{class:'grad',style:'background:linear-gradient(90deg,#c1361b,#f3f6f7,#0e6b63)'});
  panel.append(el('div',{class:'legendbar'},
    el('span',{},'Under median'),grad,el('span',{},'Över median'),
    el('span',{class:'muted',style:'margin-left:auto'},
      el('span',{class:'dot',style:'background:#e3e8ea;margin-right:5px'}),'ingen data')));
  root.append(panel);
  root.append(el('div',{class:'note'},
    'Värdet är andelen elever som svarat ”Helt och hållet” på frågan – inte samma 0–10-index '+
    'som i övriga flikar. Data finns på kommunnivå 2022–2026 via Kolada. Vita/grå kommuner '+
    'saknar publicerat värde (ofta för få svarande).'));
}
function colForPct(v,med){
  const d=v-med;const c=d>=4?'var(--pos)':d<=-4?'var(--neg)':'var(--muted)';
  return `color:${c}`;
}

/* ===================== NAV ===================== */
const TABS=[['oversikt','Översikt',renderOversikt],
  ['trender','Trender',renderTrender],
  ['jamfor','Jämför år',renderJamfor],
  ['karta','Karta',renderKarta],
  ['utforska','Utforska',renderUtforska]];
let active='oversikt';
function renderTabs(){
  const nav=document.getElementById('tabs');nav.innerHTML='';
  TABS.forEach(([id,label])=>nav.append(el('button',
    {class:'tab'+(id===active?' active':''),onclick:()=>{active=id;renderTabs();renderMain();}},label)));
}
function renderMain(){
  clearCharts();
  const main=document.getElementById('main');main.innerHTML='';
  TABS.find(t=>t[0]===active)[2](main);
}
renderTabs();renderMain();
</script>
